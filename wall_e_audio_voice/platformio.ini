[platformio]
default_envs = wall_e_audio_s3

[env:wall_e_audio_s3]
platform = espressif32
framework = espidf
board = esp32-s3-devkitc-1-16mb
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

; WALL-E OTA Configuration
; Set IPs to match your devices on the network.
; Base: AP 192.168.4.1 or STA IP when on home WiFi
; Controller: 192.168.4.2 (when connected to WALL-E AP)
; Dock: 192.168.1.xxx (when on home WiFi)

[base]
project = main_wall_E_base
env = wall_e_brain_s3
upload_port = 192.168.4.1
; upload_port = 192.168.1.xxx  ; Use when base on home WiFi

[controller]
project = wall_e_master_controller
env = cyd_esp32_2432s028
upload_port = 192.168.4.2

[dock]
project = dock_station
env = dock_esp32
upload_port = 192.168.1.100

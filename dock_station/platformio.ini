; WALL-E Dock Station - Smart Charging Crate
; ESP32-WROOM-32 30-pin DevKit

[platformio]
default_envs = dock_esp32

[env:dock_esp32]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
upload_speed = 921600

; OTA upload when dock is on home WiFi (set upload_port to dock's IP)
; upload_protocol = espota
; upload_port = 192.168.1.xxx
